<script>
    class Intro extends Phaser.Scene {
        constructor() {
            super('intro');
        }

        preload() {
            this.load.image('background', 'assets/background.png');
            this.load.image('loading_1', 'assets/loading_1.png');
        }

        create() {
            this.add.image(800, 600, 'background');
            this.add.image(200, 150, 'loading_1');
        }
    }
